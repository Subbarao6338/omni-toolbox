<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N Box</title>
  <meta name="description" content="N Box - A personal dashboard to organize and access your favorite websites and tools.">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="N Box">
  <link rel="apple-touch-icon" href="assets/favicon.svg">
  <link rel="icon" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
  <div class="app-layout">
    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <div class="logo-container" onclick="UI.setView('bookmarks')">
          <span class="material-icons app-logo">inbox</span>
          <h1 class="page-title">N Box</h1>
        </div>
        <div class="top-actions">
          <div class="search-container" id="search-container">
            <button id="search-toggle" class="icon-btn" title="Search" aria-label="Toggle Search">
              <span class="material-icons">search</span>
            </button>
            <input type="search" id="search" placeholder="Search Bookmarks or Toolbox... [/]" aria-label="Search everything" />
            <button id="search-clear" class="search-clear-btn" title="Clear Search" aria-label="Clear Search">
              <span class="material-icons">close</span>
            </button>
          </div>
          <!-- Settings Toggle -->
          <button id="settings-toggle" class="icon-btn" onclick="UI.openModal('modal-settings')" title="Settings" aria-label="Open Settings">
            <span class="material-icons">settings</span>
          </button>
        </div>
      </header>

      <nav class="tab-bar">
        <div class="tab-group" id="group-toolbox">
          <div id="tab-toolbox" class="tab-item active" title="Toolbox">
            <span class="material-icons">handyman</span>
            <span class="tab-name">Toolbox</span>
            <nav id="toolbox-breadcrumb" class="breadcrumb-nav"></nav>
          </div>
        </div>
        <div class="tab-group" id="group-bookmarks">
          <div id="tab-bookmarks" class="tab-item" title="Bookmarks (Long press for Profiles)">
            <span class="material-icons">bookmarks</span>
            <span class="tab-name">Bookmarks</span>
            <nav id="bookmarks-breadcrumb" class="breadcrumb-nav"></nav>
          </div>
          <button id="add-bookmark-btn" class="icon-btn" onclick="UI.openModal('modal-settings', 'add')" title="Add Bookmark" aria-label="Add Bookmark">
            <span class="material-icons">add</span>
          </button>
        </div>
        <div class="tab-group" id="group-projects">
          <div id="tab-projects" class="tab-item" title="Projects">
            <span class="material-icons">rocket_launch</span>
            <span class="tab-name">Projects</span>
            <nav id="projects-breadcrumb" class="breadcrumb-nav"></nav>
          </div>
        </div>
      </nav>

      <nav id="main-category-nav" class="main-category-nav">
        <!-- Horizontal pills injected here -->
      </nav>

      <div id="content" class="tools-container">
        <!-- Content injected here -->
      </div>
      <button id="back-to-top" title="Back to Top">
        <span class="material-icons">arrow_upward</span>
      </button>
    </main>
  </div>

  <!-- Modals -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;"></div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal" style="display:none;">
    <div class="modal-tabs">
      <button class="tab-btn active" onclick="UI.switchTab('general')">
        <span class="material-icons">settings</span> Global
      </button>
      <button class="tab-btn" onclick="UI.switchTab('bookmarks')">
        <span class="material-icons">bookmarks</span> Bookmarks
      </button>
      <button class="tab-btn" onclick="UI.switchTab('toolbox')">
        <span class="material-icons">handyman</span> Toolbox
      </button>
      <button class="tab-btn" onclick="UI.switchTab('projects')">
        <span class="material-icons">rocket_launch</span> Projects
      </button>
      <button class="tab-btn" onclick="UI.switchTab('add')" id="tab-add-btn">
        <span class="material-icons">add_box</span> <span id="tab-add-label">Add Bookmark</span>
      </button>
      <button class="tab-btn" onclick="UI.switchTab('about')">
        <span class="material-icons">info</span> About
      </button>
    </div>

    <!-- Global Tab -->
    <div id="tab-general" class="tab-pane">
      <h2 class="settings-header">Global Settings</h2>
      <div class="settings-section">
        <h3>Appearance</h3>
        <div class="pill-group">
          <button class="pill" onclick="PageTools.toggleDarkMode()" id="settings-theme-btn" aria-label="Toggle Dark Mode">
            <span class="material-icons" id="settings-theme-icon">dark_mode</span>
            <span id="settings-theme-text">Dark Mode</span>
          </button>
          <button class="pill" onclick="PageTools.toggleCompact()" id="settings-compact-btn" aria-label="Toggle Compact View">
            <span class="material-icons">view_module</span>
            <span>Compact View</span>
          </button>
          <button class="pill" onclick="PageTools.toggleHideUrls()" id="settings-hide-urls-btn" aria-label="Toggle Hide URLs">
            <span class="material-icons">link_off</span>
            <span>Hide URLs</span>
          </button>
          <button class="pill" onclick="PageTools.toggleHideIcons()" id="settings-hide-icons-btn" aria-label="Toggle Hide Icons">
            <span class="material-icons">hide_image</span>
            <span>Hide Icons</span>
          </button>
          <button class="pill" onclick="PageTools.toggleGlass()" id="settings-glass-btn" aria-label="Toggle Solid Mode">
            <span class="material-icons">blur_off</span>
            <span>Solid Mode</span>
          </button>
          <button class="pill" onclick="PageTools.toggleShowStats()" id="settings-stats-btn" aria-label="Toggle Show Counts">
            <span class="material-icons">analytics</span>
            <span>Show Counts</span>
          </button>
          <button class="pill" onclick="PageTools.toggleAurora()" id="settings-aurora-btn" aria-label="Toggle Aurora Background">
            <span class="material-icons">auto_awesome</span>
            <span>Aurora BG</span>
          </button>
        </div>
        <div class="pill-group" style="margin-top: 10px;">
          <button class="pill" onclick="PageTools.toggleReducedMotion()" id="settings-motion-btn" aria-label="Toggle Reduced Motion">
            <span class="material-icons">motion_photos_off</span>
            <span>Reduced Motion</span>
          </button>
          <button class="pill" onclick="PageTools.toggleAutoFocus()" id="settings-focus-btn" aria-label="Toggle Auto-focus Search">
            <span class="material-icons">center_focus_strong</span>
            <span>Auto-focus Search</span>
          </button>
        </div>
        <div class="pill-group" id="color-palette" style="margin-top: 15px;">
          <button class="color-pill" style="background: #6366f1;" data-color="indigo" onclick="PageTools.setColor('indigo')" title="Indigo"></button>
          <button class="color-pill" style="background: #3b82f6;" data-color="blue" onclick="PageTools.setColor('blue')" title="Blue"></button>
          <button class="color-pill" style="background: #06b6d4;" data-color="cyan" onclick="PageTools.setColor('cyan')" title="Cyan"></button>
          <button class="color-pill" style="background: #10b981;" data-color="green" onclick="PageTools.setColor('green')" title="Green"></button>
          <button class="color-pill" style="background: #eab308;" data-color="yellow" onclick="PageTools.setColor('yellow')" title="Yellow"></button>
          <button class="color-pill" style="background: #f59e0b;" data-color="orange" onclick="PageTools.setColor('orange')" title="Orange"></button>
          <button class="color-pill" style="background: #ef4444;" data-color="red" onclick="PageTools.setColor('red')" title="Red"></button>
          <button class="color-pill" style="background: #ec4899;" data-color="pink" onclick="PageTools.setColor('pink')" title="Pink"></button>
          <button class="color-pill" style="background: #8b5cf6;" data-color="purple" onclick="PageTools.setColor('purple')" title="Purple"></button>
          <button class="color-pill" style="background: #7c3aed;" data-color="violet" onclick="PageTools.setColor('violet')" title="Violet"></button>
          <button class="color-pill" style="background: #84cc16;" data-color="lime" onclick="PageTools.setColor('lime')" title="Lime"></button>
          <button class="color-pill" style="background: #0ea5e9;" data-color="sky" onclick="PageTools.setColor('sky')" title="Sky"></button>
          <button class="color-pill" style="background: #f43f5e;" data-color="rose" onclick="PageTools.setColor('rose')" title="Rose"></button>
          <button class="color-pill" style="background: #475569;" data-color="slate" onclick="PageTools.setColor('slate')" title="Slate"></button>
          <button class="color-pill" style="background: #000000;" data-color="black" onclick="PageTools.setColor('black')" title="Black"></button>
        </div>
      </div>

    </div>

    <!-- Bookmarks Settings Tab -->
    <div id="tab-bookmarks-settings" class="tab-pane" style="display:none;">
      <h2 class="settings-header">Bookmarks Settings</h2>
      <div class="settings-section">
        <h3>Behavior</h3>
        <div class="pill-group">
          <button class="pill" onclick="PageTools.toggleNewTab()" id="settings-newtab-btn" aria-label="Toggle Open in New Tab">
            <span class="material-icons">open_in_new</span>
            <span>Open in New Tab</span>
          </button>
          <button class="pill" onclick="PageTools.toggleConfirmDelete()" id="settings-confirm-btn" aria-label="Toggle Confirm Deletion">
            <span class="material-icons">delete_sweep</span>
            <span>Confirm Deletion</span>
          </button>
        </div>
      </div>
      <div class="settings-section">
        <h3>Bookmarks Data</h3>
        <div class="pill-group">
          <button class="pill" onclick="Tools.exportData()" aria-label="Export Data Backup">
            <span class="material-icons">download</span> Export Backup
          </button>
          <label class="pill" style="cursor: pointer;" aria-label="Import Data Backup">
            <span class="material-icons">upload</span> Import Backup
            <input type="file" accept="application/json" onchange="Tools.importData(this)" style="display:none;">
          </label>
          <button class="pill" style="color: #ef4444;" onclick="Tools.resetData()" aria-label="Reset Bookmarks to Default">
            <span class="material-icons">refresh</span> Reset Bookmarks
          </button>
        </div>
      </div>
    </div>

    <!-- Toolbox Settings Tab -->
    <div id="tab-toolbox-settings" class="tab-pane" style="display:none;">
      <h2 class="settings-header">Toolbox Settings</h2>
      <div class="settings-section">
        <h3>Toolbox Configuration</h3>
        <div class="pill-group">
          <button class="pill" onclick="PageTools.toggleShowStats()" id="toolbox-stats-btn" aria-label="Toggle Show Counts">
            <span class="material-icons">analytics</span>
            <span>Show Tool Counts</span>
          </button>
          <button class="pill" onclick="PageTools.toggleToolboxGroups()" id="toolbox-groups-btn" aria-label="Toggle Group by Category">
            <span class="material-icons">reorder</span>
            <span>Group by Category</span>
          </button>
          <button class="pill" style="color: #ef4444;" onclick="Tools.resetData()" aria-label="Reset Toolbox to Default">
            <span class="material-icons">refresh</span> Reset Toolbox
          </button>
        </div>
      </div>
    </div>

    <!-- Projects Settings Tab -->
    <div id="tab-projects-settings" class="tab-pane" style="display:none;">
      <h2 class="settings-header">Projects Settings</h2>
      <div class="settings-section">
        <h3>Project Configuration</h3>
        <div class="pill-group">
          <button class="pill" onclick="PageTools.toggleProjectsInternal()" id="projects-internal-btn" aria-label="Toggle Open Projects Internally">
            <span class="material-icons">tab</span>
            <span>Open Internally (Iframe)</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Add/Edit Tab -->
    <div id="tab-add" class="tab-pane" style="display:none;">
      <h2 id="modal-title" style="margin-top: 0;">Add Bookmark</h2>
      <form id="tool-form" onsubmit="UI.handleFormSubmit(event)">
        <input type="hidden" id="edit-id">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="tool-title" required placeholder="My Bookmark">
        </div>
        <div class="form-group">
          <label>Primary URL</label>
          <input type="url" id="tool-url" required placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label>Alternative URLs (Optional) <button type="button" class="btn-small" onclick="UI.addUrlField()"><span class="material-icons" style="font-size: 1rem; vertical-align: middle;">add</span> Add
              URL</button></label>
          <div id="alternative-urls-container">
            <!-- Dynamic URL fields will be added here -->
          </div>
        </div>
        <div class="form-group">
          <label>Icon (URL or Emoji) - Optional</label>
          <input type="text" id="tool-icon" placeholder="e.g. 🚀 or https://...">
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="tool-category" list="category-list" required placeholder="Utilities">
          <datalist id="category-list"></datalist>
        </div>

        <div class="form-actions" style="margin-top: 1.5rem;">
          <button type="submit" class="btn-primary" style="width: 100%;">Save Bookmark</button>
        </div>
      </form>
    </div>

    <!-- About Tab -->
    <div id="tab-about" class="tab-pane" style="display:none;">
      <div class="about-content" id="about-content">
        <!-- README content will be injected here -->
      </div>
    </div>

    <div class="form-actions">
      <button type="button" onclick="UI.closeModal()">Close</button>
    </div>
  </div>

  <!-- Profile Selection Modal -->
  <div id="modal-profile-selection" class="modal" style="display:none;">
    <h2 style="margin-top: 0;">Select Profile</h2>
    <div id="profile-list" class="profile-list">
      <!-- Profiles injected here -->
    </div>
    <div class="form-actions" style="margin-top: 2rem;">
      <button type="button" onclick="UI.closeModal()">Cancel</button>
    </div>
  </div>

  <!-- URL Selection Modal -->
  <div id="modal-url-selection" class="modal" style="display:none;">
    <h2 id="modal-title-urls">Select URL</h2>
    <div id="url-list" class="url-list">
      <!-- URLs injected here -->
    </div>
    <div class="form-actions">
      <button type="button" id="btn-copy-all" class="btn-primary" style="display:none;" onclick="Utils.copyAllUrls()">
        <span class="material-icons">content_copy</span> Copy All
      </button>
      <button type="button" onclick="UI.closeModal()">Cancel</button>
    </div>
  </div>

  <!-- Toolbox Modal -->
  <div id="modal-toolbox" class="modal" style="display:none;">
    <h2 id="toolbox-title" style="margin-top: 0;">Toolbox</h2>
    <div id="toolbox-content">
      <!-- Tool UI injected here -->
    </div>
    <div class="form-actions" style="margin-top: 2rem;">
      <button type="button" onclick="Toolbox.close()">Close</button>
    </div>
  </div>


  <script src="js/hub.js"></script>
  <script src="js/toolbox.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
</body>


</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notion Scraper & File Archiver Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5/umd/material-ui.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>
    <script type="text/babel">
        function Dashboard() {
            const { TextField, Button, Container, Typography, Box, Alert, Card, CardContent, Divider, LinearProgress, Grid } = MaterialUI;
            const [token, setToken] = React.useState('');
            const [workspaceId, setWorkspaceId] = React.useState('');
            const [translate, setTranslate] = React.useState(true);
            const [usingBackend, setUsingBackend] = React.useState(false);

            const [x_user, setXUser] = React.useState('');
            const [x_pass, setXPass] = React.useState('');
            const [d_user, setDUser] = React.useState('');
            const [d_pass, setDPass] = React.useState('');

            const [folderPath, setFolderPath] = React.useState('');
            const [databaseId, setDatabaseId] = React.useState('');
            const [uploadDatabaseId, setUploadDatabaseId] = React.useState('');

            const [isValidated, setIsValidated] = React.useState(false);
            const [status, setStatus] = React.useState('idle');
            const [error, setError] = React.useState('');
            const [selectedFile, setSelectedFile] = React.useState(null);
            const [fileUploading, setFileUploading] = React.useState(false);
            const [crawlerMessage, setCrawlerMessage] = React.useState('');
            const [history, setHistory] = React.useState([]);

            const fetchHistory = async () => {
                const res = await fetch('/api/task-history');
                const data = await res.json();
                setHistory(data);
            };

            React.useEffect(() => {
                fetchHistory();
            }, []);

            React.useEffect(() => {
                let interval;
                if (status === 'running') {
                    interval = setInterval(async () => {
                        const res = await fetch('/api/scrape-status');
                        const data = await res.json();
                        setCrawlerMessage(data.message);
                        if (data.status === 'success' || data.status === 'failed') {
                            setStatus(data.status);
                            if (data.status === 'failed') setError(data.message);
                            fetchHistory();
                            clearInterval(interval);
                        }
                    }, 3000);
                }
                return () => clearInterval(interval);
            }, [status]);

            const validateConfig = async () => {
                setStatus('validating');
                try {
                    const res = await fetch('/api/validate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, workspaceId })
                    });
                    const data = await res.json();
                    if (data.valid) {
                        setStatus('idle');
                        setIsValidated(true);
                        setUsingBackend(data.using_backend);
                    } else {
                        setStatus('error');
                        setError(data.error);
                    }
                } catch (e) {
                    setStatus('error');
                    setError(e.message);
                }
            };

            const triggerScraper = async (site) => {
                setStatus('running');
                let payload = { token, workspaceId, translate };
                if (site === 'xossipy') {
                    payload = { ...payload, baseUrl: 'https://xossipy.com/', loginUrl: 'https://xossipy.com/login.php?do=login', username: x_user, password: x_pass };
                } else {
                    payload = { ...payload, baseUrl: 'https://desifakes.com/', loginUrl: 'https://desifakes.com/login.php?do=login', username: d_user, password: d_pass };
                }
                await fetch('/api/start-scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            };

            const triggerFolderScan = async () => {
                setStatus('running');
                await fetch('/api/scan-folder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, workspaceId, folderPath, databaseId, translate })
                });
            };

            const stopCurrentTask = async () => {
                await fetch('/api/stop-task', { method: 'POST' });
                fetchHistory();
            };

            const clearHistory = async () => {
                await fetch('/api/clear-history', { method: 'POST' });
                setHistory([]);
            };

            const executeDocumentUpload = async () => {
                setFileUploading(true);
                const form = new FormData();
                form.append("file", selectedFile);
                form.append("token", token);
                form.append("workspaceId", workspaceId);
                form.append("databaseId", uploadDatabaseId);
                form.append("translate", translate);
                const res = await fetch('/api/upload-document', { method: 'POST', body: form });
                const data = await res.json();
                setFileUploading(false);
                if(data.success) {
                    alert("Document successfully indexed!");
                    fetchHistory();
                }
                else alert("Error: " + data.error);
            };

            return (
                <Container maxWidth="xl" className="py-10">
                    <Typography variant="h3" className="font-bold text-center mb-10 text-gray-800">Enterprise Content Ingestion Engine</Typography>

                    <Card className="shadow-lg bg-white mb-10">
                        <CardContent>
                            <Typography variant="h5" className="mb-4 font-bold text-blue-800">0. Notion Configuration</Typography>
                            <Grid container spacing={4} alignItems="center">
                                <Grid item xs={12} md={4}>
                                    <TextField fullWidth type="password" label="Integration Secret Token" placeholder="Leave blank to use backend .env" onChange={(e) => setToken(e.target.value)} />
                                </Grid>
                                <Grid item xs={12} md={4}>
                                    <TextField fullWidth label="Parent Page/Workspace ID" placeholder="Leave blank to use backend .env" onChange={(e) => setWorkspaceId(e.target.value)} />
                                </Grid>
                                <Grid item xs={12} md={2}>
                                    <Box className="flex items-center">
                                        <input type="checkbox" checked={translate} onChange={(e) => setTranslate(e.target.checked)} className="mr-2 h-5 w-5" />
                                        <Typography variant="body1">Enable Translation</Typography>
                                    </Box>
                                </Grid>
                                <Grid item xs={12} md={2}>
                                    <Button fullWidth variant="contained" size="large" onClick={validateConfig} disabled={status === 'validating'}>
                                        {status === 'validating' ? 'Validating...' : 'Validate'}
                                    </Button>
                                </Grid>
                            </Grid>
                            {isValidated && (
                                <Alert severity="success" className="mt-4">
                                    Credentials Validated {usingBackend ? "(Using Backend Configuration)" : "(Using Frontend Token)"}
                                </Alert>
                            )}
                            {status === 'error' && <Alert severity="error" className="mt-4">{error}</Alert>}
                        </CardContent>
                    </Card>

                    <Grid container spacing={4}>
                        {/* Block 1: Xossipy */}
                        <Grid item xs={12} md={4}>
                            <Card className="shadow-md h-full">
                                <CardContent>
                                    <Typography variant="h6" className="mb-4 font-bold text-purple-700">1. Xossipy Scraper</Typography>
                                    <TextField fullWidth label="Username" className="mb-4" onChange={(e) => setXUser(e.target.value)} />
                                    <TextField fullWidth type="password" label="Password" className="mb-6" onChange={(e) => setXPass(e.target.value)} />
                                    <Button fullWidth variant="contained" color="secondary" onClick={() => triggerScraper('xossipy')} disabled={!isValidated || status === 'running'}>
                                        Start Xossipy Crawl
                                    </Button>
                                </CardContent>
                            </Card>
                        </Grid>

                        {/* Block 2: Desifakes */}
                        <Grid item xs={12} md={4}>
                            <Card className="shadow-md h-full">
                                <CardContent>
                                    <Typography variant="h6" className="mb-4 font-bold text-red-700">2. Desifakes Scraper</Typography>
                                    <TextField fullWidth label="Username" className="mb-4" onChange={(e) => setDUser(e.target.value)} />
                                    <TextField fullWidth type="password" label="Password" className="mb-6" onChange={(e) => setDPass(e.target.value)} />
                                    <Button fullWidth variant="contained" color="error" onClick={() => triggerScraper('desifakes')} disabled={!isValidated || status === 'running'}>
                                        Start Desifakes Crawl
                                    </Button>
                                </CardContent>
                            </Card>
                        </Grid>

                        {/* Block 3: Folder & Files */}
                        <Grid item xs={12} md={4}>
                            <Card className="shadow-md h-full">
                                <CardContent>
                                    <Typography variant="h6" className="mb-4 font-bold text-green-700">3. Local Ingestion</Typography>
                                    <Typography variant="caption" className="block mb-2 text-gray-500">Supports: PDF, DOCX, PPTX, HTML, MD, TXT, JSON, YAML, XML, CSV, XLSX, Archive</Typography>
                                    <TextField fullWidth label="Local Folder Path" className="mb-4" onChange={(e) => setFolderPath(e.target.value)} />
                                    <TextField fullWidth label="Notion Database ID (Optional)" className="mb-4" onChange={(e) => setDatabaseId(e.target.value)} />
                                    <Button fullWidth variant="contained" color="success" onClick={triggerFolderScan} className="mb-6" disabled={!isValidated || status === 'running' || !folderPath}>
                                        Run Folder Scan
                                    </Button>
                                    <Divider className="my-6">OR UPLOAD FILE</Divider>
                                    <TextField fullWidth label="Target Database ID (Optional)" className="mb-4" size="small" onChange={(e) => setUploadDatabaseId(e.target.value)} />
                                    <input type="file" className="block w-full text-sm mb-4" onChange={(e) => setSelectedFile(e.target.files[0])} />
                                    <Button fullWidth variant="outlined" onClick={executeDocumentUpload} disabled={!isValidated || !selectedFile || fileUploading}>
                                        {fileUploading ? 'Uploading...' : 'Upload Single File'}
                                    </Button>
                                </CardContent>
                            </Card>
                        </Grid>
                    </Grid>

                    {status === 'running' && (
                        <Box className="mt-10 p-6 bg-blue-50 rounded-lg">
                            <Box className="flex justify-between items-center mb-4">
                                <Typography variant="h6" className="text-blue-800 animate-pulse">{crawlerMessage}</Typography>
                                <Button variant="contained" color="error" size="small" onClick={stopCurrentTask}>Stop Task</Button>
                            </Box>
                            <LinearProgress color="primary" />
                        </Box>
                    )}
                    {status === 'success' && <Alert severity="success" className="mt-10">Task completed successfully.</Alert>}

                    <Card className="shadow-lg bg-white mt-10">
                        <CardContent>
                            <Box className="flex justify-between items-center mb-4">
                                <Typography variant="h5" className="font-bold text-gray-800">Recent Activities</Typography>
                                <Button size="small" variant="outlined" color="inherit" onClick={clearHistory}>Clear History</Button>
                            </Box>
                            <Divider className="mb-4" />
                            {history.length === 0 ? (
                                <Typography color="textSecondary">No recent tasks recorded.</Typography>
                            ) : (
                                <table className="w-full text-left">
                                    <thead>
                                        <tr className="text-gray-500 uppercase text-xs">
                                            <th className="pb-2">Time</th>
                                            <th className="pb-2">Type</th>
                                            <th className="pb-2">Details</th>
                                            <th className="pb-2 text-right">Status</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {history.map(task => (
                                            <tr key={task.id} className="text-sm">
                                                <td className="py-3 text-gray-500">{task.timestamp}</td>
                                                <td className="py-3 font-medium">{task.type}</td>
                                                <td className="py-3 text-gray-600 truncate max-w-xs">{task.details}</td>
                                                <td className="py-3 text-right">
                                                    <span className={`px-2 py-1 rounded-full text-xs ${
                                                        task.status === 'success' ? 'bg-green-100 text-green-700' :
                                                        task.status === 'failed' ? 'bg-red-100 text-red-700' :
                                                        task.status === 'stopped' ? 'bg-orange-100 text-orange-700' :
                                                        'bg-gray-100 text-gray-700'
                                                    }`}>
                                                        {task.status}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </CardContent>
                    </Card>
                </Container>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
    </script>
</body>
</html>

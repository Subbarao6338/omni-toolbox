<source>
  @type windows_eventlog2
  @id windows_eventlog2
  channels application,system,security
  read_existing_events false
  tag winevt.raw
  rate_limit 200
  parse_description true
  <storage>
    @type local
    persistent true
    path C:\opt\td-agent\winlog.jsons
  </storage>
</source>

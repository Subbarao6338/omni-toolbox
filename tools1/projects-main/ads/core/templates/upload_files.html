{% endblock stylesheets %} {% block content %}
<div class="container">
    <div class="row justify-content-center p-4">
<!--breadcrumb      start  -->
        <div class="p-1" style="
        margin-top: 36px;
        position: fixed;
        height: 30px;
        width: 1150px;
        background-color: white;
        z-index:100;
      ">
            <a class="btn-link" href="/" style="font-size: 14px;">
                <b>Home&emsp;</b>
            </a>
            <b>></b> &emsp;
            <a class="btn-link" href="/uploaded_files_table" style="font-size: 14px;">
                <b>List Of Sources&emsp;</b>
            </a>
            <b>></b> &emsp;
            <b style="font-size: 14px;">Connect Data Source</b>
        </div>
        <!--breadcrumb    end    -->
        <div style="margin-top: 70px;">
            <div class="border m-2 p-1" style="width: 750px; height: auto;">
                <h5 class="text-center border-bottom" style="padding: 5px;">
                    <b>Connect Data Source</b>
                </h5>
                <form name="upload_file" class="was-validated mt-3" style="padding-left: 30px; padding-top: 10px; font-size: 16px;">
                    <div class="mb-3 row" style="margin-left: -25px; margin-right: -11px;">
                        <label class="form-label col-4">Name</label>
                        <input id="title_name" name="title_name" style="margin-left: 3px;" aria-label="required" required minlength="1" class="form-control is-invalid col-7" type="text" placeholder="Enter Title" value="" />
                    </div>

                    <div class="mb-3 row" style="margin-left: -25px; margin-right: -11px;">
                        <label class="form=label col-4" for="datasource_type_select">
              Type
            </label>
                        <select id="datasource_type_select" name="datasource_type_select" style="margin-left: 3px;" class="form-control col-7" onchange="get_selected_data_type()">
              <option value="local_file">Local File</option>
                            <option value="database">Database</option>
              <!-- <option value="azure_storage">Azure Storage</option> -->
              <option value="apache_kafka">Apache Kafka</option>

            </select>
                    </div>

                    <div id="connection_details_form" class="mb-3 row" style="margin-left: -25px; margin-right: -11px;">
                        <label class="form-label col-4">Upload Delimiter File</label>
                        <input id="upload_file" aria-label="required" style="margin-left: 3px;" required minlength="1" name="upload_file" class="form-control col-7" type="file" accept=".csv, .json" value="" />
                    </div>

                    <div class="mb-3 text-center">
                        <button id="submit_button" type="button" class="btn btn-outline-primary" onclick="save_details()" style="display: '';">
              Submit
            </button>
                        <button id="connect_button" type="button" class="btn btn-outline-primary" onclick="save_details()" data-toggle="modal" data-target="#myModal" style="display: none;">
              Submit
            </button> &ensp;
                        <button id="kafka_button" type="button" class="btn btn-outline-primary" onclick="save_kafka_details()" style="display: none;">
              Submit
            </button> &ensp;
                        <button type="button" class="btn btn-outline-secondary" onclick="clear_form_content()" style="margin-left: -12px;">
              Reset
            </button> &ensp;
                        <button type="button" class="btn btn-outline-danger" onclick="HandleBack()">
              Back
            </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Modal -->
    <div id="myModal" class="modal fade" role="dialog">
        <div class="modal-dialog modal-dialog-centered">
            <!-- Modal content-->
            <div class="modal-content">
                <div class="modal-body">
                    <label class="form-label">Selected Dataset</label>
                    <select id="select_dataset" required class="form-control">
            <option value="none">No Dataset Found</option>
          </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-primary" data-dismiss="modal" onclick="save_db_conn()">
            Submit
          </button>
                    <button type="button" class="btn btn-outline-secondary" data-dismiss="modal">
            Close
          </button>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}

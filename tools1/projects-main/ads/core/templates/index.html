<style>
.input_div{
position:relative;
}
  .icon_button:hover + .help_text{
    display:block;
  }
  .help_text {
    display: none;
    position:absolute;
    right:60px;
    top:10px;
    color:white;
    background-color:black;
    padding:2px 4px;
    border-radius:4px;
    z-index:10;
  }
</style>
<!-- Table style -->

{% endblock stylesheets %} {% block content %}

    <div class="container">
  <div class="row justify-content-center p-3">
    <div class="border rounded shadow-sm p-2" style="width: 450px; max-width: 100%">
      <h4 class="text-center">Upload Files</h4>
          <div class="mb-3">
          <label class="form-label">Title</label>
          <input id="title_name"
            name="title_name"
            required
            class="form-control"
            type="text"
            placeholder="Enter Title"
          />
        </div>
        <div class="mb-3">
          <label class="form-label">Upload file</label>
          <input id="upload_file"
            required
            name="upload_file"
            class="form-control"
            type="file"
            accept=".csv, .json"
          />
        </div>
        <div class="mb-3">
          <button type="button" class="btn btn-outline-primary"  onclick="save_details()"><b>Submit</b></button>
          <button type="button" class="btn btn-outline-secondary" onclick="clear_form_content()"><b>Reset</b></button>
        </div>
    </div>
  </div>
  <div class="row justify-content-center">
    <div
      class="border rounded shadow-sm p-2"
      style="width: 1000px; max-width: 100%; overflow: auto"
    >
      <h5 class="text-center">Uploaded files Status</h5>
      <div class="row mt-2" id="json_content">
            <table  class="table table-striped" style="width:100%">
                <thead>
                    <tr>
                        <th>S.No</th>
                        <th>Title</th>
                        <th>File Name</th>
                        <th>Upload Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="files_list">
                </tbody>
            </table>
        </div>
    </div>
  </div>
</div><br/>

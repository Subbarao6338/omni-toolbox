{% block javascripts %}

<!-- jQuery -->
<script>
  function readURL(input) {
    if (input.files && input.files[0]) {

      var reader = new FileReader();
      reader.onload = function (e) {
          if ((e.target.result).slice(5,10)!="image"){
            document.querySelector("#display_image").setAttribute("src", "https://img.icons8.com/dotty/80/000000/archive-folder.png")
            document.getElementById("display_image").style.height = "150px";
            document.getElementById("display_image").style.width = "150px";
            document.getElementById("display_image").style.marginLeft = "205px";
            document.getElementById("display_image").style.marginTop = "175px";
            }
          else{
            document.querySelector("#display_image").setAttribute("src",e.target.result);
            document.getElementById("display_image").style.height = "100%";
            document.getElementById("display_image").style.width = "100%";
            document.getElementById("display_image").style.marginLeft = "0px";
            document.getElementById("display_image").style.marginTop = "0px";
            document.getElementById("demo2").innerHTML = "";
          }
      };

      reader.readAsDataURL(input.files[0]);
    }
  }
</script>

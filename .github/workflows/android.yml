name: Android CI

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    env:
      RETENTION_DAYS: 1

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Get Version Information
        id: get_version
        shell: bash
        run: |
          VERSION_CODE=${GITHUB_RUN_NUMBER}

          MAJOR=1
          MINOR=$(( VERSION_CODE / 10 ))
          PATCH=$(( VERSION_CODE % 10 ))

          VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"

          TAG_NAME="v${VERSION_NAME}"

          BUILD_TYPE="debug"

          APK_PATH="app/build/outputs/apk/${BUILD_TYPE}/app-${BUILD_TYPE}.apk"
          APK_NAME="NatureTools-${TAG_NAME}.apk"

          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "BUILD_TYPE=${BUILD_TYPE}" >> $GITHUB_OUTPUT
          echo "APK_PATH=${APK_PATH}" >> $GITHUB_OUTPUT
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_OUTPUT

          echo "VERSION_NAME=${VERSION_NAME}"
          echo "VERSION_CODE=${VERSION_CODE}"
          echo "TAG_NAME=${TAG_NAME}"

      - name: Setup Debug Keystore
        shell: bash
        run: |
          KEYSTORE_PATH="app/debug.keystore"

          if [ -n "${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}" ]; then
            echo "Using keystore from GitHub Secrets"
            echo "${{ secrets.ANDROID_DEBUG_KEYSTORE_B64 }}" | base64 -d > ${KEYSTORE_PATH}
          else
            echo "Generating temporary debug keystore"

            keytool -genkey -v \
              -keystore ${KEYSTORE_PATH} \
              -alias androiddebugkey \
              -keypass android \
              -storepass android \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Build APK
        env:
          APP_VERSION_NAME: ${{ steps.get_version.outputs.VERSION_NAME }}
          APP_VERSION_CODE: ${{ steps.get_version.outputs.VERSION_CODE }}
        run: |
          ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          cp "${{ steps.get_version.outputs.APK_PATH }}" \
             "${{ steps.get_version.outputs.APK_NAME }}"

      - name: Verify APK Exists
        run: |
          test -f "${{ steps.get_version.outputs.APK_NAME }}"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.get_version.outputs.APK_NAME }}
          path: ${{ steps.get_version.outputs.APK_NAME }}
          retention-days: ${{ env.RETENTION_DAYS }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create Git Tag
        run: |
          git tag ${{ steps.get_version.outputs.TAG_NAME }}
          git push origin ${{ steps.get_version.outputs.TAG_NAME }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
          name: Nature Tools ${{ steps.get_version.outputs.TAG_NAME }}

          body: |
            🚀 Automated Android Build

            Version Name: ${{ steps.get_version.outputs.VERSION_NAME }}
            Version Code: ${{ steps.get_version.outputs.VERSION_CODE }}

            Release Tag:
            ${{ steps.get_version.outputs.TAG_NAME }}

          files: |
            ${{ steps.get_version.outputs.APK_NAME }}

          prerelease: false
          make_latest: true
          generate_release_notes: true
          overwrite_files: true
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true

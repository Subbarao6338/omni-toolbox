name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Get Version
      id: get_version
      run: |
        MAJOR=$(grep 'major=' version.properties | cut -d'=' -f2)
        MINOR=$(grep 'minor=' version.properties | cut -d'=' -f2)
        PATCH=$(grep 'patch=' version.properties | cut -d'=' -f2)
        BUILD=$(grep 'build=' version.properties | cut -d'=' -f2)
        VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"
        SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          TAG_NAME="${GITHUB_REF#refs/tags/}"
        else
          TAG_NAME="v${VERSION}-b${{ github.run_number }}-${SHORT_SHA}"
        fi

        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
        echo "VERSION_CODE=$BUILD" >> $GITHUB_OUTPUT
        echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "APK_NAME=NatureTools-${TAG_NAME}.apk" >> $GITHUB_OUTPUT

    - name: Run Tests
      run: ./gradlew test

    - name: Run Lint
      run: ./gradlew lintDebug

    - name: Build with Gradle
      run: ./gradlew :app:assembleDebug
      env:
        APP_VERSION_NAME: ${{ steps.get_version.outputs.VERSION_NAME }}
        APP_VERSION_CODE: ${{ steps.get_version.outputs.VERSION_CODE }}

    - name: Rename APK
      run: mv app/build/outputs/apk/debug/app-debug.apk ${{ steps.get_version.outputs.APK_NAME }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.get_version.outputs.TAG_NAME }}
        path: ${{ steps.get_version.outputs.APK_NAME }}

    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.TAG_NAME }}
        name: Release ${{ steps.get_version.outputs.TAG_NAME }}
        files: ${{ steps.get_version.outputs.APK_NAME }}
        prerelease: false
        make_latest: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
